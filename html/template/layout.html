<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{{.appname}}</title>

    <script
      defer
      src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"
    ></script>
    <script src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.8/dist/htmx.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/d3@7"></script>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script
      src="https://kit.fontawesome.com/8939ee1afa.js"
      crossorigin="anonymous"
    ></script>

    <style type="text/tailwindcss">
      @theme {
        --font-jakarta: "Plus Jakarta Sans", sans-serif;
        --font-cinzel: "Cinzel", serif;
        --font-roboto: "Roboto", sans-serif;
        --font-poppins: "Poppins", sans-serif;
        --font-playfair: "Playfair Display", serif;
        --font-raleway: "Raleway", sans-serif;
        --font-noto-sans: "Noto Sans", sans-serif;
        --font-noto-serif: "Noto Serif", serif;
      }
    </style>

    <link rel="stylesheet" href="/static/css/styles.css" />
  </head>

  <body
    x-data="{ sidebarOpen: false }"
    class="bg-[#fafaf9] text-stone-900 antialiased overflow-hidden flex h-screen selection:bg-stone-200 selection:text-stone-900 font-jakarta"
  >
    {{ template "sidebar" . }}

    <div
      class="flex-1 flex flex-col min-w-0 bg-[#fafaf9] overflow-y-auto relative"
    >
      <div
        class="absolute top-0 inset-x-0 h-64 bg-gradient-to-b from-stone-200/40 to-transparent pointer-events-none -z-10"
      ></div>
      {{ template "header" . }}

      <main class="flex-1 p-4 sm:p-6 lg:p-8">
        <div class="max-w-7xl mx-auto space-y-8">
          {{ template "content" . }}
        </div>
      </main>
    </div>

    <script src="/static/js/index.js"></script>
  </body>
</html>

{{ define "header"}}
<header
  class="sticky top-0 z-30 flex items-center justify-between px-4 py-4 lg:px-8 backdrop-blur-md border-b border-stone-200/40 bg-[#fafaf9]/75"
>
  <div class="flex items-center gap-4">
    <button
      type="button"
      @click="sidebarOpen = true"
      class="lg:hidden p-2 -ml-2 text-stone-500 hover:text-stone-900 hover:bg-stone-200/50 rounded-xl transition-colors cursor-pointer"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 6h16M4 12h16M4 18h16"
        ></path>
      </svg>
    </button>
    <h2 class="text-lg font-serif font-medium lg:hidden">Dashboard</h2>
  </div>

  <div class="flex items-center gap-3 ml-auto">
    <span class="text-sm font-medium text-stone-600 hidden sm:block"
      >Vedic Admin</span
    >
    <div
      class="w-9 h-9 rounded-full bg-stone-200 border border-stone-300 flex items-center justify-center text-stone-600 font-serif font-bold text-sm"
    >
      VA
    </div>
  </div>
</header>
{{end}} {{ define "sidebar"}}
<div
  x-show="sidebarOpen"
  x-transition:enter="transition-opacity ease-linear duration-300"
  x-transition:enter-start="opacity-0"
  x-transition:enter-end="opacity-100"
  x-transition:leave="transition-opacity ease-linear duration-300"
  x-transition:leave-start="opacity-100"
  x-transition:leave-end="opacity-0"
  @click="sidebarOpen = false"
  x-cloak
  class="fixed inset-0 z-40 bg-stone-900/60 backdrop-blur-sm lg:hidden"
></div>

<aside
  :class="sidebarOpen ? 'translate-x-0' : '-translate-x-full'"
  class="fixed inset-y-0 left-0 z-50 w-full lg:w-72 bg-white border-r border-stone-200/60 transform transition-transform duration-300 ease-in-out lg:translate-x-0 lg:static lg:block flex flex-col shadow-2xl lg:shadow-none"
>
  <div
    class="flex items-center justify-between px-6 py-5 border-b border-stone-100"
  >
    <div class="flex items-center gap-3">
      <div
        class="w-10 h-10 flex items-center justify-center rounded-full bg-stone-50 border border-stone-200/60 text-stone-800"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          class="w-5 h-5"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="4" />
          <path d="M12 2v2" />
          <path d="M12 20v2" />
          <path d="m4.93 4.93 1.41 1.41" />
          <path d="m17.66 17.66 1.41 1.41" />
          <path d="M2 12h2" />
          <path d="M20 12h2" />
          <path d="m6.34 17.66-1.41 1.41" />
          <path d="m19.07 4.93-1.41 1.41" />
        </svg>
      </div>
      <span class="font-serif text-xl font-medium tracking-wide"
        >{{.appname}}</span
      >
    </div>
    <button
      @click="sidebarOpen = false"
      class="lg:hidden p-2 text-stone-400 hover:text-stone-900 hover:bg-stone-50 rounded-xl transition-colors"
    >
      <svg
        class="w-6 h-6"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M6 18L18 6M6 6l12 12"
        ></path>
      </svg>
    </button>
  </div>

  <nav class="flex-1 px-4 py-6 space-y-2 overflow-y-auto">
    <a
      href="/"
      class="flex items-center gap-3 px-4 py-3 bg-stone-50 border border-stone-200/60 text-stone-900 rounded-xl font-semibold transition-colors shadow-sm"
    >
      <svg
        class="w-5 h-5 opacity-70"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"
        ></path>
      </svg>
      Dashboard
    </a>
    <a
      href="/pos-table"
      class="flex items-center gap-3 px-4 py-3 text-stone-500 hover:bg-stone-50 hover:text-stone-900 rounded-xl font-medium transition-colors"
    >
      <span
        style="font-size: medium"
        class="material-symbols-outlined w-5 h-5 opacity-70"
      >
        <i class="fa-solid fa-earth-asia"></i>
      </span>
      Position Table
    </a>
    <a
      href="/tithy-table"
      class="flex items-center gap-3 px-4 py-3 text-stone-500 hover:bg-stone-50 hover:text-stone-900 rounded-xl font-medium transition-colors"
    >
      <svg
        class="w-5 h-5 opacity-70"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"
        ></path>
      </svg>
      Tithy
    </a>
    <a
      href="/planet-conjunction"
      class="flex items-center gap-3 px-4 py-3 text-stone-500 hover:bg-stone-50 hover:text-stone-900 rounded-xl font-medium transition-colors"
    >
      <svg
        class="w-5 h-5 opacity-70"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"
        ></path>
      </svg>
      Conjunction Finder
    </a>
    <a
      href="/planet-shadbala"
      class="flex items-center gap-3 px-4 py-3 text-stone-500 hover:bg-stone-50 hover:text-stone-900 rounded-xl font-medium transition-colors"
    >
      <svg
        class="w-5 h-5 opacity-70"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <circle cx="12" cy="12" r="4" stroke-width="2"></circle>
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 2v2M12 20v2M2 12h2M20 12h2m-4.34-7.07-1.41 1.41M7.75 17.66l-1.41 1.41m0-14.14 1.41 1.41m8.5 11.32 1.41 1.41"></path>
      </svg>
      Planet Shadbala
    </a>
    <a
      href="/ohlc-upload"
      class="flex items-center gap-3 px-4 py-3 text-stone-500 hover:bg-stone-50 hover:text-stone-900 rounded-xl font-medium transition-colors"
    >
      <svg
        class="w-5 h-5 opacity-70"
        fill="none"
        stroke="currentColor"
        viewBox="0 0 24 24"
      >
        <path
          stroke-linecap="round"
          stroke-linejoin="round"
          stroke-width="2"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M12 4v12m0-12l-4 4m4-4l4 4"
        />
      </svg>
      OHLC Upload
    </a>
  </nav>
</aside>
{{ end }}
