version: "2"
sql:
  - engine: "postgresql"
    queries: "query.sql"
    schema: "schema.sql"
    gen:
      go:
        package: "sqls"
        out: "sqls"
        sql_package: "pgx/v5"
        emit_db_tags: true
        emit_prepared_queries: true
        emit_interface: true
        emit_empty_slices: true
        emit_json_tags: true
        emit_pointers_for_null_types: true
        emit_pointers_for_null_enum_types: true
        json_tags_id_uppercase: true
        json_tags_case_style: "snake"
